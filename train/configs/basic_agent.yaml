# BasicAgent 配置
# 贝叶斯优化智能 Agent 的参数配置

# 贝叶斯优化搜索参数
initial_search: 20    # 初始随机采样点数
opt_search: 10        # 后续优化迭代次数

# 噪声设置（用于训练难度调整）
enable_noise: false
noise_std:
  V0: 0.1       # 初速度噪声标准差
  phi: 0.1      # 水平角度噪声标准差
  theta: 0.1    # 垂直角度噪声标准差
  a: 0.003      # 横向偏移噪声标准差
  b: 0.003      # 纵向偏移噪声标准差
